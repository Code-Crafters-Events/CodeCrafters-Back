spring.application.name=crafters-test

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.testcontainers.enabled=false

jwt.secret=test-secret-key-for-testing-purposes-only-32-chars-min
jwt.expiration=604800000

app.upload.dir=uploads-test
app.base-url=http://localhost:8080

stripe.secret-key=sk_test_dummy_key_for_testing
stripe.webhook-secret=whsec_test_dummy_key_for_testing

spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test@example.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

logging.level.root=WARN
logging.level.com.code.crafters=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

spring.task.scheduling.enabled=false